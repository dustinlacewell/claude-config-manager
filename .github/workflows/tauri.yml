name: Tauri

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

# Tags cut official releases; pushes to main only produce dev artifacts that
# get attached to the workflow run. Never cancel a tag build mid-flight.
concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - name: macos-x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ''
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - run: npm ci

      # --- Tag push: build + attach to a GitHub Release ------------------
      - name: Build & release (tag)
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CCM ${{ github.ref_name }}'
          releaseBody: |
            Desktop builds attached below. The website download buttons
            always point to the latest release.

            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
            for changes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}

      # --- Main push: build only, upload as workflow artifact ------------
      - name: Build (main dev artifact)
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.tauri-args }}

      - name: Collect dev artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ccm-${{ matrix.name }}-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
